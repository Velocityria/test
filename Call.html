<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 일정</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .calendar-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            border-left: 5px solid #6b8e23;
            padding-left: 10px;
            margin-bottom: 20px;
        }
        .calendar-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-weight: bold;
            margin-bottom: 10px;
            max-width: 800px;
        }
        .calendar-table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            background-color: #fff;
            margin-bottom: 40px;
        }
        .calendar-table th, .calendar-table td {
            border: 1px solid #ccc;
            width: 14.28%;
            vertical-align: top;
            padding: 8px;
        }
        .calendar-table th {
            background-color: #e6ecf5;
            text-align: center;
            font-weight: bold;
            height: 30px;
        }
        /* 요일별 색상 */
        .calendar-table th:first-child, .sun { color: #d9534f; } /* 일요일 */
        .calendar-table th:last-child, .sat { color: #0275d8; }  /* 토요일 */
        
        .day-cell {
            height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .day-num {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .event-text {
            font-size: 12px;
            color: #555;
            line-height: 1.4;
            white-space: pre-line;
        }
    </style>
</head>
